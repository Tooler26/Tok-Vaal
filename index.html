<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vaal Talk</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff0050">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HOME -->
<section id="home" class="tab active">
  <div class="feed" id="feed"></div>

  <div class="upload-btn">
    <label for="videoUpload">+</label>
    <input type="file" id="videoUpload" accept="video/*" onchange="uploadVideo()">
  </div>
</section>

<!-- COMMUNITIES -->
<section id="communities" class="tab">
  <h2>Communities Vaal</h2>

  <input type="text" id="newArea" placeholder="Suggest your area">
  <button onclick="voteArea()">Vote Area</button>

  <div id="areasList"></div>
  <hr>
  <div id="communitiesList"></div>
</section>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button onclick="showTab('home')">🏠</button>
  <button onclick="showTab('communities')">🌍</button>
</div>

<script src="script.js"></script>
</body>
</html>
